<!DOCTYPE html>
<html>

<head>
<title>Yukti AI</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
margin:0;
padding:0;
}

.container{
width:800px;
margin:60px auto;
}

h1{
text-align:center;
}

form{
display:flex;
gap:10px;
margin-bottom:30px;
}

input{
flex:1;
padding:12px;
font-size:16px;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.result-box{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
white-space:pre-wrap;
text-align:left;
word-wrap:break-word;
overflow-wrap:break-word;
}

.pdf-box{
margin-top:20px;
padding:15px;
background:#eef2ff;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h1>Yukti AI</h1>
<p style="text-align:center">Government Service Assistant</p>

<form method="POST">
<input type="text" name="request" placeholder="Example: Passport Renewal">
<button type="submit">Submit</button>
</form>

{% if response %}

<div class="result-box">
{{ response }}
</div>

{% endif %}

{% if pdf %}

<div class="pdf-box">
<h3>Relevant Government Form</h3>
<a href="{{ pdf }}" target="_blank">Download Form (PDF)</a>
</div>

{% endif %}

</div>

</body>
</html>
